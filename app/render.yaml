# render.yaml
#
# Render deployment configuration for PhysicsAgent FastAPI backend.
#
# HOW TO USE:
#   1. Push this file to the root of your GitHub repository.
#   2. Go to https://render.com → New → Blueprint
#   3. Connect your GitHub repo — Render auto-detects this file.
#   4. Set the OPENAI_API_KEY environment variable in Render dashboard.
#
# FREE TIER NOTE:
#   Render free tier spins down after 15 minutes of inactivity.
#   First request after spin-down takes ~30 seconds (cold start).
#   This is expected behaviour on the free tier.

services:
  - type: web
    name: physicsagent-api
    runtime: python
    region: singapore          # Closest to Bangladesh
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false            # You set this manually in Render dashboard — never committed to git
      - key: PYTHONUNBUFFERED
        value: "1"             # Ensures logs appear in real time in Render dashboard
      - key: PYTHONPATH
        value: "/opt/render/project/src"   # Equivalent to setting PYTHONPATH=. locally
    healthCheckPath: /health   # Render pings this to verify the service is alive
